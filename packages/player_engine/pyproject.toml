[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "player_engine"
version = "0.1.0"
dependencies = [
    "pydantic>=2.0.0",
    "economy"
]

[tool.setuptools]
packages = ["player_engine"]
py-modules = ["player_generator", "ratings", "bot_club_generator"]

[tool.setuptools.package-dir]
player_engine = "player_engine"
